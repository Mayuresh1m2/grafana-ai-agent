server:
  http_listen_port: 3200
  log_level: warn

# ── Distributor: accept traces via OTLP ──────────────────────────────────────
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

# ── Ingester ──────────────────────────────────────────────────────────────────
ingester:
  max_block_duration: 5m

# ── Compactor ─────────────────────────────────────────────────────────────────
compactor:
  compaction:
    block_retention: 48h

# ── Metrics-generator (optional span-metrics / service-graph) ─────────────────
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

# ── Storage ───────────────────────────────────────────────────────────────────
storage:
  trace:
    backend: local
    wal:
      path: /tmp/tempo/wal
    local:
      path: /tmp/tempo/blocks

# ── Query frontend ────────────────────────────────────────────────────────────
query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
  trace_by_id:
    duration_slo: 5s

# ── Overrides ─────────────────────────────────────────────────────────────────
overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
