apiVersion: v1
kind: Secret
metadata:
  name: {{ include "grafana-ai-agent.backendName" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "grafana-ai-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  GRAFANA_API_KEY: {{ .Values.backend.secrets.grafanaApiKey | quote }}
