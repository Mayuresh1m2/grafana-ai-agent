{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "grafana-ai-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "grafana-ai-agent.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # Backend API (must come before / to take priority)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "grafana-ai-agent.backendName" . }}
                port:
                  name: http
          # Frontend SPA (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "grafana-ai-agent.frontendName" . }}
                port:
                  name: http
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
{{- end }}
