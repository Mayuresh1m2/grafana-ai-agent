apiVersion: v1
kind: Service
metadata:
  name: {{ include "grafana-ai-agent.backendName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "grafana-ai-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.service.backend.type }}
  selector:
    {{- include "grafana-ai-agent.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: {{ .Values.service.backend.port }}
      targetPort: http
      protocol: TCP
