apiVersion: v1
kind: Secret
metadata:
  name: {{ include "grafana-ai-agent.backendName" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "grafana-ai-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  annotations:
    # Remind operators never to store real values in version control
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  # Required. Provide via:
  #   helm install ... --set secrets.grafanaTokenKey=<token>
  #   or a gitignored values-secret.yaml
  GRAFANA_API_KEY: {{ required "secrets.grafanaTokenKey is required — provide your Grafana service account token via --set secrets.grafanaTokenKey=<value>" .Values.secrets.grafanaTokenKey | quote }}
