apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ai-agent
  namespace: grafana-ai-agent
  labels:
    app.kubernetes.io/name: grafana-ai-agent
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx
  rules:
    - host: grafana-ai-agent.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  name: http
  # Uncomment to enable TLS with cert-manager
  # tls:
  #   - hosts:
  #       - grafana-ai-agent.local
  #     secretName: grafana-ai-agent-tls
