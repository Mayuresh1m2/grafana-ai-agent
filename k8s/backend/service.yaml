apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: grafana-ai-agent
  labels:
    app.kubernetes.io/name: grafana-ai-agent
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana-ai-agent
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
