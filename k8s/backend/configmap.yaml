apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: grafana-ai-agent
  labels:
    app.kubernetes.io/name: grafana-ai-agent
    app.kubernetes.io/component: backend
data:
  APP_NAME: "grafana-ai-agent"
  LOG_LEVEL: "INFO"
  DEBUG: "false"
  # Ollama is on the host; use host.docker.internal or the node IP in k8s
  OLLAMA_BASE_URL: "http://host.docker.internal:11434"
  OLLAMA_MODEL: "llama3"
  OLLAMA_TIMEOUT: "120.0"
  GRAFANA_BASE_URL: "http://grafana.monitoring.svc.cluster.local:3000"
  LOKI_BASE_URL: "http://loki.monitoring.svc.cluster.local:3100"
  PROMETHEUS_BASE_URL: "http://prometheus.monitoring.svc.cluster.local:9090"
  TEMPO_BASE_URL: "http://tempo.monitoring.svc.cluster.local:3200"
  CORS_ORIGINS: '["http://localhost:5173","https://grafana-ai-agent.local"]'
