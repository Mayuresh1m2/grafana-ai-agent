version: "3.9"

# Ollama runs on the HOST — not in this compose file.
# Start it with: ollama serve
# The backend reaches it via host.docker.internal:11434.

services:
  # ── Qdrant (vector store for RAG examples) ──────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - agent
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  agent:
    driver: bridge

volumes:
  qdrant-data:
