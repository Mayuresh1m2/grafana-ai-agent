server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Hide nginx version in headers and error pages
    server_tokens off;

    # ── Security headers ────────────────────────────────────────────────────────
    add_header X-Frame-Options              "SAMEORIGIN"                        always;
    add_header X-Content-Type-Options       "nosniff"                           always;
    add_header X-XSS-Protection             "1; mode=block"                     always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy           "geolocation=(), microphone=()"     always;
    # CSP: allow inline styles/scripts (Vite injects them) and WebSocket for SSE
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; font-src 'self' data:; worker-src blob:;"
        always;

    # ── Gzip compression ────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml+rss
        image/svg+xml
        font/woff2;
    gzip_min_length   1024;

    # ── Health check (used by Docker HEALTHCHECK + k8s readiness probe) ─────────
    location = /health {
        access_log  off;
        return      200 "ok\n";
        add_header  Content-Type text/plain always;
    }

    # ── Runtime env (populated by docker-entrypoint.sh) ─────────────────────────
    location = /env.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires    -1;
    }

    # ── Vue Router — SPA fallback ────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Immutable hashed assets (Vite content-hashes all JS/CSS filenames) ───────
    location ~* \.(js|css|woff2?)$ {
        expires    1y;
        add_header Cache-Control "public, immutable" always;
        try_files  $uri =404;
    }

    # ── Other static assets ──────────────────────────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires    30d;
        add_header Cache-Control "public" always;
        try_files  $uri =404;
    }
}
