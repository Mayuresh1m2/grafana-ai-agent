name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Backend jobs ──────────────────────────────────────────────────────────────
jobs:
  backend-lint:
    name: "Backend / Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check src/ app/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ app/ tests/

      - name: Mypy type check
        run: uv run mypy src/ app/

  backend-test:
    name: "Backend / Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage
        run: uv run pytest -v --tb=short --cov=src --cov=app --cov-report=xml --cov-report=term-missing -m "not integration"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

# ── Frontend jobs ─────────────────────────────────────────────────────────────
  frontend-lint:
    name: "Frontend / Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: TypeScript type check
        run: npm run type-check

  frontend-test:
    name: "Frontend / Unit Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest unit tests
        run: npm run test:unit -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

# ── Docker build jobs ─────────────────────────────────────────────────────────
  docker-backend:
    name: "Docker / Backend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build \
            --build-arg APP_VERSION=ci \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg GIT_COMMIT="${GITHUB_SHA}" \
            --tag grafana-ai-agent-backend:ci \
            --file backend/Dockerfile \
            backend

      - name: Verify non-root user (uid 1000)
        run: |
          UID_IN_IMAGE=$(docker run --rm --entrypoint '' grafana-ai-agent-backend:ci id -u)
          echo "Image runs as uid=${UID_IN_IMAGE}"
          [ "${UID_IN_IMAGE}" = "1000" ] || { echo "FAIL: expected uid 1000, got ${UID_IN_IMAGE}"; exit 1; }

      - name: Verify ENTRYPOINT includes uvicorn
        run: |
          EP=$(docker inspect --format '{{json .Config.Entrypoint}}' grafana-ai-agent-backend:ci)
          echo "Entrypoint: ${EP}"
          echo "${EP}" | grep -q "uvicorn" || { echo "FAIL: uvicorn not in ENTRYPOINT"; exit 1; }

  docker-frontend:
    name: "Docker / Frontend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: |
          docker build \
            --tag grafana-ai-agent-frontend:ci \
            --file frontend/Dockerfile \
            frontend

      - name: Verify non-root user (uid 101 — nginx)
        run: |
          UID_IN_IMAGE=$(docker run --rm -e VITE_API_URL="" \
            grafana-ai-agent-frontend:ci id -u 2>/dev/null || \
            docker run --rm --entrypoint id grafana-ai-agent-frontend:ci -u)
          echo "Image runs as uid=${UID_IN_IMAGE}"
          [ "${UID_IN_IMAGE}" = "101" ] || { echo "FAIL: expected uid 101, got ${UID_IN_IMAGE}"; exit 1; }

      - name: Verify /health endpoint exists in nginx config
        run: |
          docker run --rm --entrypoint '' grafana-ai-agent-frontend:ci \
            grep -q '/health' /etc/nginx/conf.d/default.conf \
            || { echo "FAIL: /health location missing from nginx.conf"; exit 1; }
          echo "OK: /health location present"

# ── Helm jobs ─────────────────────────────────────────────────────────────────
  helm-lint:
    name: "Helm / Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "3.15.0"

      - name: Helm lint
        run: |
          helm lint helm/grafana-ai-agent \
            --set ollama.hostUrl=http://host.k3d.internal:11434 \
            --set secrets.grafanaTokenKey=test-token-for-ci

  helm-template-dry-run:
    name: "Helm / Template dry-run"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "3.15.0"

      - uses: azure/setup-kubectl@v4
        with:
          version: "1.30.0"

      - name: helm template | kubectl apply --dry-run=client
        run: |
          helm template grafana-ai-agent helm/grafana-ai-agent \
            --set ollama.hostUrl=http://host.k3d.internal:11434 \
            --set secrets.grafanaTokenKey=test-token-for-ci \
            | kubectl apply --dry-run=client -f -

      - name: Verify required-value guard fires correctly
        run: |
          # Missing ollama.hostUrl should cause helm template to fail with our message
          if helm template grafana-ai-agent helm/grafana-ai-agent \
               --set secrets.grafanaTokenKey=test-token \
               2>&1 | grep -q "ollama.hostUrl is required"; then
            echo "OK: missing ollama.hostUrl triggers required error"
          else
            echo "FAIL: missing ollama.hostUrl did not produce required error"
            exit 1
          fi

  # ── Summary gate ────────────────────────────────────────────────────────────
  ci-pass:
    name: "CI Pass"
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - backend-test
      - frontend-lint
      - frontend-test
      - docker-backend
      - docker-frontend
      - helm-lint
      - helm-template-dry-run
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          results=(
            "${{ needs.backend-lint.result }}"
            "${{ needs.backend-test.result }}"
            "${{ needs.frontend-lint.result }}"
            "${{ needs.frontend-test.result }}"
            "${{ needs.docker-backend.result }}"
            "${{ needs.docker-frontend.result }}"
            "${{ needs.helm-lint.result }}"
            "${{ needs.helm-template-dry-run.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" != "success" ]]; then
              echo "One or more CI jobs failed or were skipped."
              exit 1
            fi
          done
          echo "All CI jobs passed."
